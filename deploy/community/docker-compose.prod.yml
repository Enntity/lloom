services:
  caddy:
    image: ${CADDY_IMAGE:?Set CADDY_IMAGE to an immutable digest-pinned Caddy image}
    restart: unless-stopped
    init: true
    ports:
      - "80:80"
      - "443:443"
    environment:
      COMMUNITY_DOMAIN: ${COMMUNITY_DOMAIN:?Set COMMUNITY_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.50
    networks:
      - public

  lloom-community:
    image: ${LLOOM_COMMUNITY_IMAGE:?Set LLOOM_COMMUNITY_IMAGE to an immutable digest-pinned release image}
    restart: unless-stopped
    init: true
    read_only: true
    user: "10001:10001"
    environment:
      NODE_ENV: production
      COMMUNITY_DOMAIN: ${COMMUNITY_DOMAIN:?Set COMMUNITY_DOMAIN}
    expose:
      - "8110"
    secrets:
      - source: lloom_signing_private_key
        target: lloom_signing_private_key
        mode: 0444
      - source: lloom_signing_public_key
        target: lloom_signing_public_key
        mode: 0444
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.50
    ulimits:
      nofile:
        soft: 4096
        hard: 4096
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8110/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - public

networks:
  public:

secrets:
  lloom_signing_private_key:
    file: ${LLOOM_SIGNING_PRIVATE_KEY:?Set LLOOM_SIGNING_PRIVATE_KEY to the host private-key path}
  lloom_signing_public_key:
    file: ${LLOOM_SIGNING_PUBLIC_KEY:?Set LLOOM_SIGNING_PUBLIC_KEY to the host public-key path}

volumes:
  caddy-data:
  caddy-config:
