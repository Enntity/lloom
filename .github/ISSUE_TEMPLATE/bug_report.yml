name: Bug report
description: Report a reproducible LLooM problem
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include API keys, private model data, prompts containing sensitive information, or other secrets. Report security issues privately using SECURITY.md.
  - type: input
    id: version
    attributes:
      label: LLooM version or commit
      placeholder: 0.2.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple Silicon
        - Linux x86_64
        - Linux arm64 / DGX Spark
        - Other
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: Output of node --version
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the expected behavior and the actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Relevant diagnostics
      description: Redact credentials and private paths before pasting logs or doctor output.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed secrets, private data, and unnecessary model output from this report.
          required: true
        - label: This is not a security vulnerability.
          required: true
